<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
	xmlns:svg="http://www.w3.org/2000/svg"
	xmlns="http://www.w3.org/2000/svg"
	xmlns:xlink="http://www.w3.org/1999/xlink"
	width="1150"
	height="1100"
	id="elements" >
	<style type="text/css" id="style">
			path{fill:#464646;}
			circle{stroke:#464646;stroke-width:3;}
			polygon{stroke:#464646;stroke-width:3;}
			text{color:#464646;font-size:80px;text-anchor:middle;}
			.a{fill:none;stroke:#aaa;stroke-width:10;marker-end:url(#m1);}
	</style>
	<defs>
		<symbol id="octagon" preserveAspectRatio="xMidYMid">
			<polygon points="115.4,83 83,115.4 37,115.4 4.6,83 4.6,37 37,4.6 83,4.6 115.4,37"/>
		</symbol>
		<radialGradient id="grice" gradientUnits="objectBoundingBox">
			<stop style="stop-color:#8ff;stop-opacity:1;" offset="0" id="stop1" />
			<stop style="stop-color:#dff;stop-opacity:1;" offset="0.5" id="stop2" />
			<stop style="stop-color:#fff;stop-opacity:1;" offset="1" id="stop3" />
		</radialGradient>
		<radialGradient id="grstorm" gradientUnits="objectBoundingBox">
			<stop style="stop-color:#aaa;stop-opacity:1;" offset="0" id="stop19" />
			<stop style="stop-color:#888;stop-opacity:1;" offset="0.5" id="stop20" />
			<stop style="stop-color:#025;stop-opacity:1;" offset="1" id="stop21" />
		</radialGradient>
		<radialGradient id="grwood" gradientUnits="objectBoundingBox">
			<stop style="stop-color:#0a0;stop-opacity:1;" offset="0" id="stop22" />
			<stop style="stop-color:#380;stop-opacity:1;" offset="0.3" id="stop23" />
			<stop style="stop-color:#840;stop-opacity:1;" offset="1" id="stop24" />
		</radialGradient>
		<radialGradient id="grlava" gradientUnits="objectBoundingBox">
			<stop style="stop-color:#f50;stop-opacity:1;" offset="0" id="stop25" />
			<stop style="stop-color:#d00;stop-opacity:1;" offset="0.7" id="stop26" />
			<stop style="stop-color:#800;stop-opacity:1;" offset="1" id="stop27" />
		</radialGradient>
		<radialGradient id="grboil" gradientUnits="objectBoundingBox">
			<stop style="stop-color:#ddf;stop-opacity:1;" offset="0" id="stop28" />
			<stop style="stop-color:#aad;stop-opacity:1;" offset="0.5" id="stop29" />
			<stop style="stop-color:#558;stop-opacity:1;" offset="1" id="stop30" />
		</radialGradient>
		<marker orient="auto" refY="0.0" refX="0.0" id="m1" style="overflow:visible;">
			<path style="fill:#aaa;" d="M -2,2 4,0 -2,-2 C -1,-0.6 -1,0.6 -2,2 z" id="arrow" />
		</marker>
	</defs>
	<g id="fire">
		<circle style="fill:#ef5f5f;" cx="575" cy="390" r="60" id="c1" />
		<text xml:space="preserve" x="575" y="415" id="t1">火</text>
	</g>
	<g id="wind">
		<circle style="fill:#a6f7f5;" cx="727" cy="500.5" r="60" id="c2" />
		<text xml:space="preserve" x="727" y="525.5" id="t2">風</text>
	</g>
	<g id="thunder">
		<circle style="fill:#faec54;" cx="669" cy="679.5" r="60" id="c3" />
		<text xml:space="preserve" x="669" y="704.5" id="t3">雷</text>
	</g>
	<g id="earth">
		<circle style="fill:#d78815;" cx="481" cy="679.5" r="60" id="c4" />
		<text xml:space="preserve" x="481" y="704.5" id="t4">土</text>
	</g>
	<g id="water">
		<circle style="fill:#7373ff;" cx="423" cy="500.5" r="60" id="c5" />
		<text xml:space="preserve" x="423" y="525.5" id="t5">水</text>
	</g>
	<g id="arrow1">
		<path d="M 548,710 605,728 595,710 605,692 z" id="a1"/>
		<use xlink:href="#a1" transform="rotate(72 575 550)" id="a2"/>
		<use xlink:href="#a1" transform="rotate(144 575 550)" id="a3"/>
		<use xlink:href="#a1" transform="rotate(-144 575 550)" id="a4"/>
		<use xlink:href="#a1" transform="rotate(-72 575 550)" id="a5"/>
	</g>
	<g id="ice">
		<use xlink:href="#octagon" x="515" y="25" style="fill:url(#grice);" id="o0" />
		<text xml:space="preserve" x="575" y="110" id="t5">氷</text>
	</g>
	<g id="unknow1">
		<use xlink:href="#octagon" x="788.3" y="113.8" style="fill: #ccc;" id="o1" />
		<text xml:space="preserve" x="848.3" y="198.8" id="t5">?</text>
	</g>
	<g id="unknow2">
		<use xlink:href="#octagon" x="957.2" y="346.3" style="fill: #ccc;" id="o2" />
		<text xml:space="preserve" x="1017.2" y="431.3" id="t5">?</text>
	</g>
	<g id="unknow3">
		<use xlink:href="#octagon" x="957.2" y="633.7" style="fill: #ccc;" id="o3" />
		<text xml:space="preserve" x="1017.2" y="718.7" id="t5">?</text>
	</g>
	<g id="unknow4">
		<use xlink:href="#octagon" x="788.3" y="866.2" style="fill: #ccc;" id="o4" />
		<text xml:space="preserve" x="848.3" y="951.2" id="t5">?</text>
	</g>
	<g id="unknow5">
		<use xlink:href="#octagon" x="515" y="955" style="fill: #ccc;" id="o5" />
		<text xml:space="preserve" x="575" y="1040.5" id="t5">?</text>
	</g>
	<g id="storm">
		<use xlink:href="#octagon" x="241.7" y="866.2" style="fill:url(#grstorm);" id="o6" />
		<text style="fill:#fff;" xml:space="preserve" x="301.7" y="951.2" id="t5">嵐</text>
	</g>
	<g id="wood">
		<use xlink:href="#octagon" x="72.8" y="633.7" style="fill:url(#grwood);" id="o7" />
		<text xml:space="preserve" x="132.8" y="718.7" id="t5">木</text>
	</g>
	<g id="lava">
		<use xlink:href="#octagon" x="72.8" y="346.3" style="fill:url(#grlava);" id="o8" />
		<text xml:space="preserve" x="132.8" y="431.3" id="t5">熔</text>
	</g>
	<g id="boil">
		<use xlink:href="#octagon" x="241.7" y="113.8" style="fill:url(#grboil);" id="o9" />
		<text xml:space="preserve" x="301.7" y="198.8" id="t5">沸</text>
	</g>
	<g id="arrow2">
		<g id="g1">
			<g id="g1a">
				<path class="a" d="M 500,750 540,910" id="b1" />
				<path class="a" d="M 620,735 395,865" id="b2" />
			</g>
			<use xlink:href="#g1a" transform="matrix(-1,0,0,1,1150,0)" id="g1b"/>
		</g>
		<use xlink:href="#g1" transform="rotate(72 575 550)" id="g2"/>
		<use xlink:href="#g1" transform="rotate(144 575 550)" id="g3"/>
		<use xlink:href="#g1" transform="rotate(-144 575 550)" id="g4"/>
		<use xlink:href="#g1" transform="rotate(-72 575 550)" id="g5"/>
	</g>
</svg>